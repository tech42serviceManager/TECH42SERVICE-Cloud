<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TECH42SERVICE Gestion</title>
  <style>
    :root{
      --bg:#080808;
      --panel:#121212;
      --panel2:#181818;
      --text:#f5f5f5;
      --muted:#a7a7a7;
      --accent:#f4b51f;
      --border:#3d3217;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:250px 1fr;
    }

    .sidebar{
      background:#050505;
      border-right:1px solid var(--border);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .logo{
      width:100%;
      max-height:180px;
      object-fit:contain;
      border-radius:14px;
      background:#000;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .menu button{
      width:100%;
      border:1px solid transparent;
      background:transparent;
      color:var(--text);
      padding:13px 14px;
      border-radius:10px;
      text-align:left;
      font-size:15px;
      cursor:pointer;
    }

    .menu button:hover,
    .menu button.active{
      background:linear-gradient(135deg,var(--accent),#9d6d00);
      color:#080808;
      font-weight:700;
    }

    .main{
      padding:22px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:22px;
    }

    .topbar h1{
      margin:0;
      font-size:28px;
    }

    .topbar p{
      margin:6px 0 0;
      color:var(--muted);
    }

    .theme-select{
      background:var(--panel);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:9px;
      padding:10px;
    }

    .hero{
      background:linear-gradient(145deg,#111,#080808);
      border:1px solid var(--border);
      border-radius:16px;
      padding:26px;
      margin-bottom:20px;
    }

    .clock{
      color:var(--accent);
      font-size:56px;
      font-weight:800;
      letter-spacing:2px;
    }

    .date{
      margin-top:6px;
      font-size:20px;
      color:var(--muted);
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:20px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
    }

    .card .label{
      color:var(--muted);
      font-size:14px;
    }

    .card .value{
      margin-top:10px;
      font-size:34px;
      font-weight:800;
      color:var(--accent);
    }

    .quick{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      padding:18px;
    }

    .quick h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .quick-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }

    .quick button{
      min-height:90px;
      border:1px solid var(--border);
      border-radius:12px;
      background:var(--panel2);
      color:var(--text);
      cursor:pointer;
      font-size:15px;
    }

    .quick button:hover{
      border-color:var(--accent);
      color:var(--accent);
    }

    footer{
      margin-top:20px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{border-right:0;border-bottom:1px solid var(--border)}
      .logo{max-height:140px}
      .menu{display:grid;grid-template-columns:repeat(2,1fr)}
      .cards{grid-template-columns:repeat(2,1fr)}
      .quick-grid{grid-template-columns:repeat(2,1fr)}
    }

    @media(max-width:520px){
      .main{padding:14px}
      .topbar{align-items:flex-start;flex-direction:column}
      .clock{font-size:42px}
      .cards{grid-template-columns:1fr}
      .quick-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <img src="logo.png" alt="Logo TECH42SERVICE" class="logo" />

      <nav class="menu">
        <button class="active">Accueil</button>
        <button>Réparations</button>
        <button>Clients</button>
        <button>Stock</button>
        <button>Rendez-vous</button>
        <button>Factures / Devis</button>
        <button>Paramètres</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>Tableau de bord</h1>
          <p>Bienvenue dans TECH42SERVICE Gestion</p>
        </div>

        <select id="theme" class="theme-select" aria-label="Choisir le thème">
          <option value="gold">Noir & Or</option>
          <option value="blue">Noir & Bleu</option>
          <option value="red">Noir & Rouge</option>
          <option value="green">Noir & Vert</option>
          <option value="purple">Noir & Violet</option>
        </select>
      </header>

      <section class="hero">
        <div id="clock" class="clock">00:00:00</div>
        <div id="date" class="date"></div>
      </section>

      <section class="cards">
        <article class="card">
          <div class="label">Réparations en cours</div>
          <div class="value">0</div>
        </article>
        <article class="card">
          <div class="label">Rendez-vous aujourd'hui</div>
          <div class="value">0</div>
        </article>
        <article class="card">
          <div class="label">Articles en stock</div>
          <div class="value">0</div>
        </article>
        <article class="card">
          <div class="label">Chiffre d'affaires</div>
          <div class="value">0 €</div>
        </article>
      </section>

      <section class="quick">
        <h2>Accès rapides</h2>
        <div class="quick-grid">
          <button>Nouvelle réparation</button>
          <button>Nouveau client</button>
          <button>Nouveau devis</button>
          <button>Nouveau rendez-vous</button>
        </div>
      </section>

      <footer>TECH42SERVICE Gestion — Base V1 simple</footer>
    </main>
  </div>

  <script>
    const clock = document.getElementById("clock");
    const date = document.getElementById("date");
    const theme = document.getElementById("theme");

    const themes = {
      gold:   { accent:"#f4b51f", border:"#3d3217" },
      blue:   { accent:"#3ea6ff", border:"#17374d" },
      red:    { accent:"#ff4b4b", border:"#4d1c1c" },
      green:  { accent:"#4cd964", border:"#1b4724" },
      purple: { accent:"#b16cff", border:"#38204d" }
    };

    function updateClock(){
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("fr-FR");
      date.textContent = now.toLocaleDateString("fr-FR", {
        weekday:"long",
        day:"2-digit",
        month:"long",
        year:"numeric"
      });
    }

    function applyTheme(name){
      const selected = themes[name] || themes.gold;
      document.documentElement.style.setProperty("--accent", selected.accent);
      document.documentElement.style.setProperty("--border", selected.border);
      localStorage.setItem("tech42-theme", name);
    }

    theme.addEventListener("change", () => applyTheme(theme.value));

    const savedTheme = localStorage.getItem("tech42-theme") || "gold";
    theme.value = savedTheme;
    applyTheme(savedTheme);

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
